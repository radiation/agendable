name: Semgrep

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "11 5 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config p/default \
            --exclude-rule=python.django.security.django-no-csrf-token.django-no-csrf-token \
            --exclude-rule=html.security.audit.missing-integrity.missing-integrity
