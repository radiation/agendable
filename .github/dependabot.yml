version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 10

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

    # Note: this repo uses `uv.lock` for fully pinned Python dependencies.
    # Dependabot's `pip` updater will update pinned versions in requirement-style
    # files, but it does not currently update `uv.lock`, so with open-ended
    # specifiers like `fastapi>=0.115` it will often log "No update possible"
    # and open no PR.
    #
    # Automated uv lockfile upgrades are handled by the scheduled workflow:
    # `.github/workflows/uv-lock-upgrade.yml`.

    versioning-strategy: increase
    groups:
      python-runtime:
        dependency-type: "production"
        patterns:
          - "*"
      python-dev:
        dependency-type: "development"
        patterns:
          - "*"
    open-pull-requests-limit: 10
