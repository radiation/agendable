services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: agendable
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d agendable" ]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    profiles: [ "sso" ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://127.0.0.1:8081
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8081:8080"
    volumes:
      - ./dev/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    command: [ "start-dev", "--import-realm" ]

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AGENDABLE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/agendable
      AGENDABLE_AUTO_CREATE_DB: "false"
    volumes:
      - ./:/app
    command: alembic upgrade head

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      AGENDABLE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/agendable
      AGENDABLE_AUTO_CREATE_DB: "false"
      AGENDABLE_SESSION_SECRET: dev-only-change-me
      AGENDABLE_SMTP_HOST: mailpit
      AGENDABLE_SMTP_PORT: "1025"
      AGENDABLE_SMTP_FROM_EMAIL: noreply@agendable.local
      AGENDABLE_SMTP_USE_STARTTLS: "false"
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./:/app
    command: uvicorn agendable.app:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src

  reminder-worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      AGENDABLE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/agendable
      AGENDABLE_SMTP_HOST: mailpit
      AGENDABLE_SMTP_PORT: "1025"
      AGENDABLE_SMTP_FROM_EMAIL: noreply@agendable.local
      AGENDABLE_SMTP_USE_STARTTLS: "false"
      AGENDABLE_REMINDER_WORKER_POLL_SECONDS: "30"
    volumes:
      - ./:/app
    command: agendable run-reminders-worker

  calendar-sync-worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      AGENDABLE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/agendable
      AGENDABLE_GOOGLE_CALENDAR_SYNC_ENABLED: "true"
      AGENDABLE_GOOGLE_CALENDAR_SYNC_WORKER_POLL_SECONDS: "30"
    volumes:
      - ./:/app
    command: agendable run-google-calendar-sync-worker

volumes:
  postgres_data:
