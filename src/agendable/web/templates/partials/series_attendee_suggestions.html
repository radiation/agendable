{% if query|trim|length >= 2 and users %}
<ul class="list-clean attendee-suggestions-list">
    {% for user in users %}
    <li>
        <button type="button" data-attendee-email="{{ user.email }}"
            data-attendee-label="{{ user.display_name }} &lt;{{ user.email }}&gt;" class="attendee-suggestions-option">
            {{ user.display_name }} &lt;{{ user.email }}&gt;
        </button>
    </li>
    {% endfor %}
</ul>
{% elif query|trim|length >= 2 %}
<p class="attendee-suggestions-empty">
    <small>No matching users found.</small>
</p>
{% endif %}
