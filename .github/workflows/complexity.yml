name: Complexity

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  complexity:
    name: Xenon Complexity Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install xenon
        run: python -m pip install --upgrade pip xenon

      - name: Collect changed Python files
        if: github.event_name == 'pull_request'
        id: changed_py
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            src/**/*.py

      - name: Show complexity report (PR changed files)
        if: github.event_name == 'pull_request' && steps.changed_py.outputs.any_changed == 'true'
        run: |
          radon cc \
            --show-complexity \
            --average \
            ${{ steps.changed_py.outputs.all_changed_files }}

      - name: Enforce complexity thresholds (PR changed files)
        if: github.event_name == 'pull_request' && steps.changed_py.outputs.any_changed == 'true'
        run: |
          xenon \
            --max-absolute B \
            --max-modules B \
            --max-average A \
            ${{ steps.changed_py.outputs.all_changed_files }}

      - name: Skip complexity gate (no changed Python files)
        if: github.event_name == 'pull_request' && steps.changed_py.outputs.any_changed != 'true'
        run: echo "No changed Python files under src/; skipping Xenon complexity check."

      - name: Show complexity report (main full scan)
        if: github.event_name != 'pull_request'
        run: |
          radon cc \
            --show-complexity \
            --average \
            src/agendable

      - name: Enforce complexity thresholds (main full scan)
        if: github.event_name != 'pull_request'
        run: |
          xenon \
            --max-absolute B \
            --max-modules B \
            --max-average A \
            src/agendable
