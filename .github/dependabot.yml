version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 10

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"

    ignore:
      - dependency-name: "agendable"

    groups:
      python-runtime:
        dependency-type: "production"
        patterns:
          - "*"
      python-dev:
        dependency-type: "development"
        patterns:
          - "*"

    # Keep `pyproject.toml` as the source of truth for constraints.
    # With `increase`, Dependabot will bump minimum constraints in
    # `pyproject.toml` (e.g., fastapi>=X) and also refresh `uv.lock`.
    versioning-strategy: increase
    open-pull-requests-limit: 10
