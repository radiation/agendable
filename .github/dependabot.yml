version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 10

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"

    groups:
      python-runtime:
        dependency-type: "production"
        patterns:
          - "*"
      python-dev:
        dependency-type: "development"
        patterns:
          - "*"

    # Keep `pyproject.toml` as the source of truth for constraints,
    # and let Dependabot update `uv.lock` for resolved versions.
    versioning-strategy: lockfile-only
    open-pull-requests-limit: 10
